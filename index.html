    <script src="./SmoothScroll.js"></script>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        async function loadLinks() {
            try {
                const response = await fetch('links.json');
                const data = await response.json();
                const container = document.getElementById('categories-container');
                data.categories.forEach(category => {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    sec.setAttribute('data-category', category.id);
                    sec.innerHTML = `<h2 class="section-header">${category.name}</h2><div class="links-grid"></div>`;
                    category.sites.filter(s => s.enabled !== false).forEach(site => {
                        const link = document.createElement('a');
                        link.href = site.url;
                        link.target = '_blank';
                        link.className = 'link-card';
                        link.setAttribute('data-name', site.name);
                        link.innerHTML = `<img src="${site.logo}" alt="${site.name}" class="card-logo">`;
                        sec.querySelector('.links-grid').appendChild(link);
                    });
                    container.appendChild(sec);
                    observer.observe(sec);
                });
            } catch (e) { console.error(e); }
        }
        window.addEventListener('DOMContentLoaded', loadLinks);

        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        function applyFilter() {
            const query = searchInput.value.toLowerCase();
            const filter = document.querySelector('.filter-btn.active').dataset.filter;
            document.querySelectorAll('.section').forEach(sec => {
                const cards = sec.querySelectorAll('.link-card');
                let hasVisible = false;
                cards.forEach(card => {
                    const match = card.dataset.name.toLowerCase().includes(query) && (filter === 'all' || sec.dataset.category === filter);
                    card.style.display = match ? 'flex' : 'none';
                    if (match) hasVisible = true;
                });
                sec.style.display = hasVisible ? 'block' : 'none';
            });
        }
        searchInput.addEventListener('input', applyFilter);
        filterBtns.forEach(btn => btn.addEventListener('click', function() {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            applyFilter();
        }));

        const fill = document.querySelector('.scroll-progress-fill');
        const circumference = 2 * Math.PI * 23;
        fill.style.strokeDasharray = circumference;
        window.addEventListener('scroll', () => {
            const top = window.pageYOffset;
            const height = document.documentElement.scrollHeight - window.innerHeight;
            fill.style.strokeDashoffset = circumference - ((top / height) * circumference);
            document.getElementById('backToTopWrapper').classList.toggle('show', top > 300);
            document.getElementById('navbar').classList.toggle('scrolled', top > 50);
        });
        document.getElementById('backToTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        document.getElementById('navToggle').addEventListener('click', () => document.getElementById('navMenu').classList.toggle('active'));
    </script>
</body>
