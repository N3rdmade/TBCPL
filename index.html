    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                } else {
                    entry.target.classList.remove('active'); 
                }
            });
        }, { threshold: 0.1 });

        async function loadLinks() {
            try {
                const response = await fetch('links.json');
                const data = await response.json();
                const container = document.getElementById('categories-container');
                data.categories.forEach(category => {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    sec.setAttribute('data-category', category.id);
                    sec.innerHTML = `<h2 class="section-header">${category.name}</h2><div class="links-grid"></div>`;
                    
                    category.sites.filter(s => s.enabled !== false).forEach(site => {
                        const link = document.createElement('a');
                        link.href = site.url;
                        link.target = '_blank';
                        link.className = 'link-card';
                        link.setAttribute('data-name', site.name);
                        link.innerHTML = `<img src="${site.logo}" class="card-logo" alt="${site.name}">`;
                        sec.querySelector('.links-grid').appendChild(link);
                    });
                    container.appendChild(sec);
                    observer.observe(sec);
                });
            } catch (e) { console.error(e); }
        }
        
        window.addEventListener('DOMContentLoaded', async () => {
            await loadLinks();
            applyFilter(); // Forces the non-Movies sections to hide immediately on load
        });

        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        
        function applyFilter() {
            const query = searchInput.value.toLowerCase();
            const filter = document.querySelector('.filter-btn.active').dataset.filter;
            let delay = 0; 

            document.querySelectorAll('.section').forEach(sec => {
                const cards = sec.querySelectorAll('.link-card');
                let hasVisible = false;
                
                cards.forEach(card => {
                    const match = card.dataset.name.toLowerCase().includes(query) && (sec.dataset.category === filter);
                    card.style.display = match ? 'flex' : 'none';
                    if (match) hasVisible = true;
                });
                
                if (hasVisible) {
                    sec.style.display = 'block';
                    sec.classList.remove('active');
                    setTimeout(() => { sec.classList.add('active'); }, 20 + delay);
                    delay += 50; 
                } else {
                    sec.style.display = 'none';
                    sec.classList.remove('active');
                }
            });
        }
        
        searchInput.addEventListener('input', applyFilter);
        
        // 1. The Click Behavior (Perfectly frames the dock)
        filterBtns.forEach(btn => btn.addEventListener('click', function() {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            applyFilter();
            
            // Glides page so the Dock hits the top, framing the perfectly centered slide below it
            const anchor = document.getElementById('searchAnchor');
            const yPosition = anchor.getBoundingClientRect().top + window.scrollY - 60;
            window.scrollTo({ top: yPosition, behavior: 'smooth' });
        }));

        // 2. The Custom PowerPoint Scroll Engine
        let slideCooldown = false;

        window.addEventListener('wheel', (e) => {
            if (slideCooldown) return;

            const btns = Array.from(document.querySelectorAll('.filter-btn'));
            const activeIdx = btns.findIndex(b => b.classList.contains('active'));

            // Check boundaries: Are we at the bottom of the grid, or the top of the dock?
            const atBottom = Math.ceil(window.innerHeight + window.scrollY) >= document.body.offsetHeight - 10;
            
            const anchor = document.getElementById('searchAnchor');
            const anchorTop = anchor.offsetTop - 65; 
            const isAtOrAboveAnchor = window.scrollY <= anchorTop + 5;

            if (e.deltaY > 30 && atBottom) {
                // SCROLL DOWN -> Triggers Next Slide
                if (activeIdx < btns.length - 1) {
                    e.preventDefault();
                    slideCooldown = true;
                    btns[activeIdx + 1].click(); // Mimics clicking the pill perfectly!
                    setTimeout(() => slideCooldown = false, 1200);
                }
            } else if (e.deltaY < -30 && isAtOrAboveAnchor) {
                // SCROLL UP -> Triggers Previous Slide
                if (activeIdx > 0) {
                    e.preventDefault();
                    slideCooldown = true;
                    btns[activeIdx - 1].click(); // Mimics clicking the pill perfectly!
                    setTimeout(() => slideCooldown = false, 1200);
                }
            }
        }, { passive: false });

        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navMenu').classList.toggle('active');
        });
    </script>
</body>
