    <script>
        // Updated Observer to sync with your CSS classes
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active'); // Changed to .active to trigger animation
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        async function loadLinks() {
            try {
                const response = await fetch('links.json');
                const data = await response.json();
                const container = document.getElementById('categories-container');

                data.categories.forEach(category => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section'; // Matches CSS for glass box
                    sectionDiv.setAttribute('data-category', category.id);

                    const header = document.createElement('h2');
                    header.className = 'section-header';
                    header.textContent = category.name;
                    sectionDiv.appendChild(header);

                    const linksGrid = document.createElement('div');
                    linksGrid.className = 'links-grid';

                    category.sites.filter(site => site.enabled !== false).forEach(site => {
                        const link = document.createElement('a');
                        link.href = site.url;
                        link.target = '_blank';
                        link.className = 'link-card';
                        link.setAttribute('data-name', site.name);
                        link.innerHTML = `<img src="${site.logo}" alt="${site.name}" class="card-logo">`;
                        linksGrid.appendChild(link);
                    });

                    sectionDiv.appendChild(linksGrid);
                    container.appendChild(sectionDiv);
                    observer.observe(sectionDiv);
                });
            } catch (error) {
                console.error('Error loading links:', error);
            }
        }

        window.addEventListener('DOMContentLoaded', loadLinks);

        // Mobile Navigation Toggle
        const navToggle = document.getElementById('navToggle');
        const navMenu = document.getElementById('navMenu');
        navToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Search & Filter (Dynamic)
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').getAttribute('data-filter');
            const sections = document.querySelectorAll('.section[data-category]');

            sections.forEach(section => {
                const linkCards = section.querySelectorAll('.link-card');
                const categoryMatch = (activeFilter === 'all' || section.getAttribute('data-category') === activeFilter);
                let hasVisibleCards = false;

                linkCards.forEach(card => {
                    const name = card.getAttribute('data-name').toLowerCase();
                    if (name.includes(searchTerm) && categoryMatch) {
                        card.style.display = 'flex';
                        hasVisibleCards = true;
                    } else {
                        card.style.display = 'none';
                    }
                });
                section.style.display = hasVisibleCards ? 'block' : 'none';
            });
        }

        searchInput.addEventListener('input', applyFilters);
        filterButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                filterButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
        });

        // Scroll Progress & Navbar State
        const backToTopWrapper = document.getElementById('backToTopWrapper');
        const progressFill = document.querySelector('.scroll-progress-fill');
        const circumference = 2 * Math.PI * 23;
        progressFill.style.strokeDasharray = circumference;

        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrollPercentage = scrollTop / scrollHeight;

            progressFill.style.strokeDashoffset = circumference - (scrollPercentage * circumference);
            backToTopWrapper.classList.toggle('show', scrollTop > 300);
            document.getElementById('navbar').classList.toggle('scrolled', scrollTop > 50);
        });

        document.getElementById('backToTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
