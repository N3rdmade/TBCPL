    <script>
        // Scroll Reveal Animation Observer
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, observerOptions);

        // Load and render links from JSON
        async function loadLinks() {
            try {
                const response = await fetch('links.json');
                const data = await response.json();
                const container = document.getElementById('categories-container');

                data.categories.forEach(category => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section';
                    sectionDiv.setAttribute('data-category', category.id);

                    const header = document.createElement('h2');
                    header.className = 'section-header';
                    header.textContent = category.name;
                    sectionDiv.appendChild(header);

                    const linksGrid = document.createElement('div');
                    linksGrid.className = 'links-grid';

                    category.sites.filter(site => site.enabled !== false).forEach(site => {
                        const link = document.createElement('a');
                        link.href = site.url;
                        link.target = '_blank';
                        link.className = 'link-card';
                        link.setAttribute('data-name', site.name);
                        link.innerHTML = `<img src="${site.logo}" alt="${site.name}" class="card-logo">`;
                        linksGrid.appendChild(link);
                    });

                    sectionDiv.appendChild(linksGrid);
                    container.appendChild(sectionDiv);
                    observer.observe(sectionDiv);
                });
            } catch (error) {
                console.error('Error loading links:', error);
            }
        }

        // Initialize loading
        window.addEventListener('DOMContentLoaded', loadLinks);

        // Mobile Navigation Toggle
        const navToggle = document.getElementById('navToggle');
        const navMenu = document.getElementById('navMenu');
        navToggle.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            navToggle.classList.toggle('active');
        });

        // Sticky Navbar
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', function() {
            if (window.pageYOffset > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Search Functionality
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const sections = document.querySelectorAll('.section[data-category]');
            const filterButtons = document.querySelectorAll('.filter-btn');

            if (searchTerm !== '') {
                filterButtons.forEach(btn => btn.classList.remove('active'));
                document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
            }

            sections.forEach(section => {
                const linkCards = section.querySelectorAll('.link-card');
                let hasVisibleCards = false;

                linkCards.forEach(card => {
                    const name = card.getAttribute('data-name').toLowerCase();
                    if (name.includes(searchTerm)) {
                        card.style.display = 'flex';
                        hasVisibleCards = true;
                    } else {
                        card.style.display = 'none';
                    }
                });

                section.style.display = (hasVisibleCards || searchTerm === '') ? 'block' : 'none';
            });
        });

        // Filter Functionality
        const filterButtons = document.querySelectorAll('.filter-btn');
        filterButtons.forEach(button => {
            button.addEventListener('click', function() {
                const filter = this.getAttribute('data-filter');
                const sections = document.querySelectorAll('.section[data-category]');

                filterButtons.forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                searchInput.value = '';

                sections.forEach(section => {
                    if (filter === 'all' || section.getAttribute('data-category') === filter) {
                        section.style.display = 'block';
                        section.querySelectorAll('.link-card').forEach(c => c.style.display = 'flex');
                    } else {
                        section.style.display = 'none';
                    }
                });
            });
        });

        // Scroll Progress & Back to Top
        const backToTopWrapper = document.getElementById('backToTopWrapper');
        const backToTop = document.getElementById('backToTop');
        const progressFill = document.querySelector('.scroll-progress-fill');

        window.addEventListener('scroll', function() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrollPercentage = (scrollTop / scrollHeight) * 100;

            const radius = 23;
            const circumference = 2 * Math.PI * radius;
            progressFill.style.strokeDashoffset = circumference - (scrollPercentage / 100) * circumference;

            if (scrollTop > 300) {
                backToTopWrapper.classList.add('show');
            } else {
                backToTopWrapper.classList.remove('show');
            }
        });

        backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    </script>
