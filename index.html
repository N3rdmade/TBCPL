    <script>
        async function loadLinks() {
            try {
                const response = await fetch('links.json');
                const data = await response.json();
                const container = document.getElementById('categories-container');
                data.categories.forEach(category => {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    sec.setAttribute('data-category', category.id);
                    sec.innerHTML = `<h2 class="section-header">${category.name}</h2><div class="links-grid"></div>`;

                    category.sites.filter(s => s.enabled !== false).forEach(site => {
                        const link = document.createElement('a');
                        link.href = site.url;
                        link.target = '_blank';
                        link.className = 'link-card';
                        link.setAttribute('data-name', site.name);
                        link.innerHTML = `<img src="${site.logo}" class="card-logo" alt="${site.name}">`;
                        sec.querySelector('.links-grid').appendChild(link);
                    });
                    container.appendChild(sec);
                });
            } catch (e) { console.error(e); }
        }
        
        window.addEventListener('DOMContentLoaded', async () => {
            await loadLinks();
        });

        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        let activeFilter = 'all';

        function applyFilters() {
            const query = searchInput.value.toLowerCase();

            document.querySelectorAll('.section').forEach(sec => {
                const category = sec.dataset.category;
                const cards = sec.querySelectorAll('.link-card');
                let hasVisible = false;

                // Check if section matches filter
                const filterMatch = activeFilter === 'all' || category === activeFilter;

                cards.forEach(card => {
                    const nameMatch = card.dataset.name.toLowerCase().includes(query);
                    const show = filterMatch && nameMatch;
                    card.style.display = show ? 'flex' : 'none';
                    if (show) hasVisible = true;
                });

                sec.style.display = (filterMatch && hasVisible) ? 'block' : 'none';
            });
        }

        searchInput.addEventListener('input', applyFilters);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                activeFilter = this.dataset.filter;
                applyFilters();
            });
        });

        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navMenu').classList.toggle('active');
        });

        // Scroll to top button with progress ring
        (function() {
            const btn = document.getElementById('scrollTopBtn');
            const ring = document.getElementById('progressRing');
            const circumference = 2 * Math.PI * 22;

            ring.style.strokeDasharray = circumference;
            ring.style.strokeDashoffset = circumference;

            window.addEventListener('scroll', function() {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;

                // Update progress ring
                if (docHeight > 0) {
                    const percent = Math.min(scrollTop / docHeight, 1);
                    ring.style.strokeDashoffset = circumference - (percent * circumference);
                }

                // Show/hide button after 200px scroll
                if (scrollTop > 200) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });

            btn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();
    </script>
