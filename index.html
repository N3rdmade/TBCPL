            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search for sites...">

                <button class="filter-btn active" data-filter="all">All</button>

    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    
    <script src="./SmoothScroll.js"></script>
    
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        async function loadLinks() {
            try {
                const response = await fetch('links.json');
                const data = await response.json();
                const container = document.getElementById('categories-container');
                data.categories.forEach(category => {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    sec.setAttribute('data-category', category.id);
                    sec.innerHTML = `<h2 class="section-header">${category.name}</h2><div class="links-grid"></div>`;
                    
                    category.sites.filter(s => s.enabled !== false).forEach(site => {
                        const link = document.createElement('a');
                        link.href = site.url;
                        link.target = '_blank';
                        link.className = 'link-card';
                        link.setAttribute('data-name', site.name);
                        link.innerHTML = `<img src="${site.logo}" class="card-logo" alt="${site.name}">`;
                        sec.querySelector('.links-grid').appendChild(link);
                    });
                    container.appendChild(sec);
                    observer.observe(sec);
                });
            } catch (e) { console.error(e); }
        }
        window.addEventListener('DOMContentLoaded', loadLinks);

        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        
        function applyFilter() {
            const query = searchInput.value.toLowerCase();
            const filter = document.querySelector('.filter-btn.active').dataset.filter;
            
            let delay = 0; // Used to stagger the float-in animation

            document.querySelectorAll('.section').forEach(sec => {
                const cards = sec.querySelectorAll('.link-card');
                let hasVisible = false;
                
                cards.forEach(card => {
                    const match = card.dataset.name.toLowerCase().includes(query) && (filter === 'all' || sec.dataset.category === filter);
                    card.style.display = match ? 'flex' : 'none';
                    if (match) hasVisible = true;
                });
                
                if (hasVisible) {
                    sec.style.display = 'block';
                    // Strip the active class so it resets
                    sec.classList.remove('active');
                    // Add it back slightly later so it beautifully floats in again
                    setTimeout(() => {
                        sec.classList.add('active');
                    }, 20 + delay);
                    delay += 50; // Makes multiple sections load in a staggered wave
                } else {
                    sec.style.display = 'none';
                    sec.classList.remove('active');
                }
            });
        }
        
        searchInput.addEventListener('input', applyFilter);
        
        // Auto-Centering using the global window.lenis we created in SmoothScroll.js
        filterBtns.forEach(btn => btn.addEventListener('click', function() {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            applyFilter();
            
            // Glides perfectly to the top to PRESENT the newly animated list
            if (window.lenis) {
                window.lenis.scrollTo(0, { duration: 1.2 }); // Perfect smooth glide
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' }); // Fallback
            }
        }));

        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navMenu').classList.toggle('active');
        });
    </script>
</body>
