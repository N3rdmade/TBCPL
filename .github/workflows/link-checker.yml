name: Link Checker

on:
  schedule:
    - cron: '23 */12 * * *'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check links
        id: check
        run: |
          node .github/scripts/check-links.js
        env:
          DISCORD_WEBHOOK: ${{ secrets.SITE_VALIDATOR_WEBHOOK }}

      - name: Attempt automatic link updates
        if: always() && hashFiles('broken-links.json') != ''
        run: node .github/scripts/update-links.js

      - name: Commit link updates
        if: always() && hashFiles('link-updates.json') != ''
        run: |
          git config user.name "rishabnotfound"
          git config user.email "rishabnotfound@users.noreply.github.com"
          git add public/links.json public/Region-Links/*.json
          if git diff --cached --quiet; then
            echo "No staged changes — skipping commit."
            exit 0
          fi
          git commit -m "bot: auto-update broken links (redirect + FMHY)"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload link updates artifact
        if: always() && hashFiles('link-updates.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: link-updates
          path: link-updates.json
          retention-days: 30

      - name: Send Discord notification
        if: always() && hashFiles('broken-links.json') != ''
        run: node .github/scripts/send-discord-notification.js
        env:
          DISCORD_WEBHOOK: ${{ secrets.SITE_VALIDATOR_WEBHOOK }}

      - name: Notify Discord on workflow crash
        if: failure() && hashFiles('broken-links.json') == ''
        run: |
          node -e "
            const https = require('https');
            const url = new URL(process.env.DISCORD_WEBHOOK);
            const payload = JSON.stringify({
              content: '<@1141729666160402565> <@321029953200324610>\n🚨 **Link Checker Crashed**\nThe workflow failed before producing a broken-links report. Check the GitHub Actions logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
            const req = https.request({
              hostname: url.hostname,
              path: url.pathname + url.search,
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
            }, res => { res.on('data', () => {}); res.on('end', () => process.exit(res.statusCode < 300 ? 0 : 1)); });
            req.on('error', e => { console.error(e); process.exit(1); });
            req.write(payload); req.end();
          "
        env:
          DISCORD_WEBHOOK: ${{ secrets.SITE_VALIDATOR_WEBHOOK }}

      - name: Upload broken links artifact
        if: always() && hashFiles('broken-links.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: broken-links
          path: broken-links.json
          retention-days: 30
